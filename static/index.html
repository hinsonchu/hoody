<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOODY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: #0f0f0f;
      border-bottom: 1px solid #1c1c1c;
      flex-shrink: 0;
    }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316, #dc2626);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }
    .hdr-text h1 { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: #f97316; }
    .hdr-text p  { font-size: 11px; color: #555; margin-top: 2px; }
    #dot {
      margin-left: auto;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #22c55e;
      transition: background .3s;
    }
    #dot.off     { background: #ef4444; }
    #dot.busy    { background: #f97316; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    .msg {
      max-width: 78%;
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #1d2231;
      border-bottom-right-radius: 4px;
      color: #c9d1d9;
    }
    .msg.hoody {
      align-self: flex-start;
      background: #1a0f00;
      border: 1px solid #2e1500;
      border-bottom-left-radius: 4px;
      color: #fcd9b0;
    }
    .msg.hoody.speaking {
      border-color: #f97316;
      box-shadow: 0 0 12px rgba(249,115,22,.18);
    }

    /* streaming cursor */
    .typing::after {
      content: '▋';
      color: #f97316;
      animation: blink .65s steps(1) infinite;
      margin-left: 1px;
    }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

    /* sound wave bars */
    .wave {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .wave b {
      display: block;
      width: 3px;
      background: #f97316;
      border-radius: 2px;
      animation: bar .75s ease-in-out infinite;
    }
    .wave b:nth-child(2) { animation-delay:.12s }
    .wave b:nth-child(3) { animation-delay:.24s }
    .wave b:nth-child(4) { animation-delay:.36s }
    @keyframes bar { 0%,100%{height:3px} 50%{height:13px} }

    /* ── Footer / input ── */
    footer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 16px;
      background: #0f0f0f;
      border-top: 1px solid #1c1c1c;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      background: #161616;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 11px 15px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color .2s;
    }
    #input:focus         { border-color: #f97316; }
    #input:disabled      { opacity: .4; cursor: not-allowed; }
    #input::placeholder  { color: #3a3a3a; }

    #send {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: none;
      background: #f97316;
      color: #fff;
      font-size: 19px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    #send:hover:not(:disabled)  { background: #ea6c0a; }
    #send:active:not(:disabled) { transform: scale(.94); }
    #send:disabled { background: #222; color: #444; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="avatar">H</div>
  <div class="hdr-text">
    <h1>HOODY</h1>
    <p>Brooklyn OG · Always real</p>
  </div>
  <div id="dot" class="off"></div>
</header>

<div id="chat">
  <div class="msg hoody">Yo, I'm listening. What's on your mind, homie?</div>
</div>

<footer>
  <textarea id="input" rows="1" placeholder="Say somethin'…" autocomplete="off"></textarea>
  <button id="send" title="Send">&#10148;</button>
</footer>

<script>
  const chat   = document.getElementById('chat');
  const input  = document.getElementById('input');
  const sendBtn= document.getElementById('send');
  const dot    = document.getElementById('dot');

  // ── Web Audio queue ────────────────────────────────────────────────────────
  let audioCtx    = null;
  let nextTime    = 0;       // wall-clock time of the next audio chunk
  let playCount   = 0;       // how many chunks are scheduled / playing

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  async function enqueueAudio(b64) {
    const ctx = getCtx();
    const bin  = atob(b64);
    const buf  = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);

    try {
      const decoded = await ctx.decodeAudioData(buf.buffer);
      const src     = ctx.createBufferSource();
      src.buffer    = decoded;
      src.connect(ctx.destination);

      // Schedule back-to-back (tiny 20 ms guard)
      const t = Math.max(ctx.currentTime + 0.02, nextTime);
      src.start(t);
      nextTime = t + decoded.duration;
      playCount++;

      src.onended = () => {
        playCount--;
        if (playCount <= 0) {
          playCount = 0;
          activeBubble?.classList.remove('speaking');
          removeWave();
        }
      };
    } catch (e) {
      console.error('Audio decode error', e);
    }
  }

  // ── Chat helpers ───────────────────────────────────────────────────────────
  let activeBubble = null;
  let waveEl       = null;

  function addUser(text) {
    const d = document.createElement('div');
    d.className = 'msg user';
    d.textContent = text;
    chat.appendChild(d);
    scrollDown();
  }

  function startBubble() {
    activeBubble = document.createElement('div');
    activeBubble.className = 'msg hoody typing';
    chat.appendChild(activeBubble);
    scrollDown();
  }

  function appendToken(text) {
    if (!activeBubble) return;
    activeBubble.appendChild(document.createTextNode(text));
    scrollDown();
  }

  function stopTyping() {
    activeBubble?.classList.remove('typing');
  }

  function showWave() {
    if (!activeBubble || waveEl) return;
    waveEl = document.createElement('span');
    waveEl.className = 'wave';
    waveEl.innerHTML = '<b></b><b></b><b></b><b></b>';
    activeBubble.appendChild(waveEl);
  }

  function removeWave() {
    waveEl?.remove();
    waveEl = null;
  }

  function scrollDown() {
    chat.scrollTop = chat.scrollHeight;
  }

  function setBusy(on) {
    input.disabled  = on;
    sendBtn.disabled = on;
    dot.className   = on ? 'busy' : '';
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  const WS = `ws://${location.host}/ws`;
  let ws = null;

  function connect() {
    ws = new WebSocket(WS);

    ws.onopen  = () => { dot.className = ''; };
    ws.onclose = () => { dot.className = 'off'; setTimeout(connect, 2000); };
    ws.onerror = () => { ws.close(); };

    ws.onmessage = async ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === 'text') {
        appendToken(msg.content);

      } else if (msg.type === 'audio') {
        activeBubble?.classList.add('speaking');
        showWave();
        await enqueueAudio(msg.data);

      } else if (msg.type === 'done') {
        stopTyping();
        setBusy(false);
        input.focus();

      } else if (msg.type === 'error') {
        stopTyping();
        if (activeBubble) activeBubble.textContent = 'Yo, somethin broke: ' + msg.content;
        setBusy(false);
      }
    };
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  function send() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    getCtx();           // unlock AudioContext on first gesture
    nextTime = 0;       // reset audio timeline for new turn

    addUser(text);
    input.value = '';
    input.style.height = 'auto';
    setBusy(true);
    startBubble();
    ws.send(text);
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  connect();
</script>
</body>
</html>
